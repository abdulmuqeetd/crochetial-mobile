name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip curl \
            openjdk-17-jdk \
            python3-pip python3-venv \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install buildozer cython==0.29.36

      - name: Clean old build
        run: |
          rm -rf .buildozer bin

      - name: First Buildozer setup attempt
        continue-on-error: true
        run: |
          buildozer -v android debug

      - name: Accept Android SDK licenses
        run: |
          SDKROOT="$HOME/.buildozer/android/platform/android-sdk"
          echo "SDKROOT=$SDKROOT"
          find "$SDKROOT" -name sdkmanager -type f || true
          SDKMANAGER=$(find "$SDKROOT" -name sdkmanager -type f | head -n 1)
          echo "SDKMANAGER=$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0" || true

      - name: Final Build APK
        run: |
          buildozer -v android debug

      - name: Show bin files
        if: always()
        run: |
          ls -la
          ls -la bin || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Crochetial-APK
          path: bin/*.apk
